<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>iRacing Telemetry</title>
<link href="https://fonts.googleapis.com/css2?family=Titillium+Web:ital,wght@0,400;0,600;1,900&family=Chivo+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0b0c; --panel:#131315; --panel2:#18181b; --line:#26262a;
  --ink:#f5f5f6; --dim:#9a9aa1;
  --red:#e10600; --red-dark:#7a0300;
}
*{box-sizing:border-box;margin:0}
body{background:var(--bg);color:var(--ink);font-family:'Titillium Web',sans-serif;min-height:100vh}

header{border-bottom:1px solid var(--line);background:linear-gradient(180deg,#101012,#0b0b0c)}
.head-in{max-width:760px;margin:0 auto;padding:18px 16px 14px;display:flex;align-items:center;gap:14px}
.slash{width:26px;height:34px;background:var(--red);transform:skewX(-18deg);flex:none}
.brand{font-style:italic;font-weight:900;font-size:20px;letter-spacing:.06em;text-transform:uppercase;line-height:1.05}
.brand small{display:block;font-style:normal;font-weight:600;font-size:10px;letter-spacing:.3em;color:var(--dim)}
.uarea{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--dim)}
.uarea a{color:var(--dim);cursor:pointer;text-decoration:none;border:1px solid var(--line);padding:4px 10px}
.uarea a:hover{color:var(--ink);border-color:var(--red)}

nav#crumb{max-width:760px;margin:0 auto;padding:14px 16px 0;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);display:flex;gap:8px;flex-wrap:wrap}
nav#crumb a{color:var(--dim);text-decoration:none}
nav#crumb a:hover{color:var(--ink)}
nav#crumb .sep{color:var(--red)}
nav#crumb .cur{color:var(--ink)}

main{max-width:760px;margin:0 auto;padding:14px 16px 60px}
h2.vt{font-style:italic;font-weight:900;text-transform:uppercase;font-size:26px;letter-spacing:.04em;margin:10px 0 16px}
h2.vt em{color:var(--red);font-style:italic}

.row{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--red-dark);padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.row:hover{border-left-color:var(--red);background:var(--panel2)}
.row .name{font-weight:600;font-size:16px;flex:1}
.row .meta{font-family:'Chivo Mono',monospace;font-size:12px;color:var(--dim);text-align:right}
.row .arrow{color:var(--red);font-weight:900}

.acc{margin-bottom:8px}
.acc .row{margin-bottom:0}
.acc.open .row{border-left-color:var(--red)}
.sess{display:none;border:1px solid var(--line);border-top:0;background:#0e0e10}
.acc.open .sess{display:block}
.sess a{display:flex;gap:14px;align-items:center;padding:11px 16px 11px 34px;color:var(--ink);text-decoration:none;border-top:1px solid var(--line);font-size:14px;flex-wrap:wrap}
.sess a:hover{background:var(--panel2)}
.sess .stype{font-weight:600;text-transform:uppercase;font-size:12px;letter-spacing:.08em;min-width:110px}
.sess .stype.race{color:var(--red)}
.sess .sdate{color:var(--dim);flex:1}
.sess .smeta{font-family:'Chivo Mono',monospace;font-size:12px;color:var(--dim)}
.wxline{display:block;font-size:11px;color:var(--dim);margin-top:2px}

.board{background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--red);padding:20px;margin-bottom:16px}
.board .lbl{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--dim)}
.board .big{font-family:'Chivo Mono',monospace;font-weight:700;font-size:clamp(38px,9vw,56px);line-height:1.1;font-variant-numeric:tabular-nums}
.board .ctx{margin-top:6px;font-size:13px;color:var(--dim)}

.wx{display:flex;flex-wrap:wrap;gap:8px;margin:-6px 0 16px}
.chip{display:flex;flex-direction:column;align-items:center;gap:2px;background:var(--panel);border:1px solid var(--line);border-top:2px solid var(--red);padding:10px 14px;min-width:86px}
.chip .ico{font-size:18px;line-height:1}
.chip .cl{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim)}
.chip .cv{font-family:'Chivo Mono',monospace;font-size:13px;font-weight:700}

.stint{margin-bottom:18px}
.sthead{display:flex;align-items:center;gap:12px;background:var(--panel2);border:1px solid var(--line);border-left:4px solid var(--red);padding:11px 14px;cursor:pointer;flex-wrap:wrap}
.sthead:hover{background:#1d1d21}
.stnum{font-style:italic;font-weight:900;text-transform:uppercase;font-size:13px;letter-spacing:.08em;color:var(--red)}
.stname{font-weight:600;flex:1}
.stmeta{font-family:'Chivo Mono',monospace;font-size:12px;color:var(--dim)}
.setupbox{display:none;border:1px solid var(--line);border-top:0;background:#0e0e10;padding:14px 16px}
.setupbox.open{display:block}
.setupbox h4{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--red);margin:10px 0 6px}
.setupbox h5{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin:8px 0 4px}
.kv{display:flex;justify-content:space-between;font-family:'Chivo Mono',monospace;font-size:12px;padding:3px 0;border-bottom:1px dashed #1c1c20}
.kvgrid{margin-bottom:4px}

.setuptabs{margin-top:2px}
.tabsrow{display:flex;align-items:center;gap:6px;margin-bottom:12px}
.tabarrow{flex:none;background:var(--panel2);border:1px solid var(--line);color:var(--dim);width:28px;height:28px;font-size:16px;line-height:1;cursor:pointer}
.tabarrow:hover{border-color:var(--red);color:var(--ink)}
.tabstrip{flex:1;display:flex;gap:4px;overflow-x:auto;scroll-behavior:smooth;scrollbar-width:none}
.tabstrip::-webkit-scrollbar{display:none}
.tabbtn{flex:none;background:var(--panel2);border:1px solid var(--line);color:var(--dim);padding:7px 14px;font-family:'Titillium Web';font-weight:600;font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;white-space:nowrap}
.tabbtn:hover{color:var(--ink)}
.tabbtn.active{border-color:var(--red);color:#fff;background:linear-gradient(180deg,#1d1214,#18181b)}
.tabpane{display:none}
.tabpane.active{display:block}
.blockgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}
.setblock{background:#0e0e10;border:1px solid var(--line);padding:10px 12px}
.kv span:last-child{color:var(--ink)}
.kv span:first-child{color:var(--dim)}

table{width:100%;border-collapse:collapse;font-family:'Chivo Mono',monospace;font-size:13px}
th{font-family:'Titillium Web';font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);text-align:left;padding:8px 10px;border-bottom:1px solid var(--red-dark)}
td{padding:9px 10px;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums}
.wxcol{color:var(--dim);font-size:12px}
tr.best td{color:#fff;background:linear-gradient(90deg,rgba(225,6,0,.22),transparent 70%)}

.empty{text-align:center;color:var(--dim);font-size:14px;padding:40px 12px;border:1px dashed var(--line)}
.err{color:var(--red);font-size:13px;padding:12px 0}

/* Auth */
.auth{max-width:380px;margin:40px auto 0;background:var(--panel);border:1px solid var(--line);border-top:3px solid var(--red);padding:26px}
.auth h2{font-style:italic;font-weight:900;text-transform:uppercase;font-size:20px;margin-bottom:16px}
.auth label{display:block;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);margin:12px 0 4px}
.auth input{width:100%;background:#0e0e10;border:1px solid var(--line);color:var(--ink);padding:10px 12px;font-family:inherit;font-size:14px}
.auth input:focus{outline:none;border-color:var(--red)}
.btn{display:block;width:100%;margin-top:16px;background:var(--red);color:#fff;border:none;padding:12px;font-family:inherit;font-weight:600;font-size:14px;text-transform:uppercase;letter-spacing:.1em;cursor:pointer}
.btn:hover{background:#c00500}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink);text-transform:none;letter-spacing:0}
.btn.ghost:hover{border-color:var(--red)}
.auth .swap{margin-top:14px;font-size:13px;color:var(--dim);text-align:center}
.auth .swap a{color:var(--red);cursor:pointer}
.auth .aerr{color:var(--red);font-size:13px;margin-top:10px;min-height:18px}
.devrow{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--line);padding:12px 16px;margin-bottom:8px}
.devrow .dname{font-weight:600;flex:1}
.devrow .dmeta{font-size:12px;color:var(--dim)}
.devrow button{background:transparent;border:1px solid var(--line);color:var(--dim);padding:5px 12px;cursor:pointer;font-family:inherit}
.devrow button:hover{border-color:var(--red);color:var(--red)}
.linkcard{max-width:420px;margin:40px auto 0;text-align:center;background:var(--panel);border:1px solid var(--line);border-top:3px solid var(--red);padding:30px}
.linkcard .code{font-family:'Chivo Mono',monospace;font-size:26px;font-weight:700;letter-spacing:.3em;margin:14px 0}
@media (prefers-reduced-motion:no-preference){
  main>*{animation:up .18s ease-out}
  @keyframes up{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
}
</style>
</head>
<body>
<header><div class="head-in">
  <div class="slash"></div>
  <div class="brand">Telemetry<small>iRacing session archive</small></div>
  <div class="uarea" id="uarea"></div>
</div></header>
<nav id="crumb"></nav>
<main id="app"><div class="empty">Caricamento…</div></main>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script>
/* ====== CONFIGURAZIONE FIREBASE: incolla qui i valori del tuo progetto ====== */
const firebaseConfig = {
  apiKey: "AIzaSyCmiNUiCtiYTtpCJIwIxIMaSjN1mhCqC98",
  authDomain: "gen-lang-client-0309211975.firebaseapp.com",
  projectId: "gen-lang-client-0309211975",
};
/* =========================================================================== */
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

const app = document.getElementById("app");
const crumb = document.getElementById("crumb");
const uarea = document.getElementById("uarea");
const cache = {carName:{}};
let pollTimer = null;

const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const fmt = s => { const m = Math.floor(s/60); return `${m}:${(s-m*60).toFixed(3).padStart(6,"0")}`; };
const fdate = iso => new Date(iso).toLocaleString("it-IT",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});
const stype = t => {
  t = (t||"").toLowerCase();
  if (t.includes("race")) return "Gara";
  if (t.includes("qual")) return "Qualifica";
  if (t.includes("practice") || t.includes("warmup")) return "Prove libere";
  if (t.includes("test")) return "Test";
  return t || "Sessione";
};
const compass = r => r==null ? "" : ["N","NE","E","SE","S","SO","O","NO"][Math.round(((r*180/Math.PI)%360+360)%360/45)%8];
const usageIt = u => {
  u = (u||"").toLowerCase();
  if (u.includes("moderately low")) return "Medio-basso";
  if (u.includes("moderately high")) return "Medio-alto";
  if (u.includes("low")) return "Basso";
  if (u.includes("high")) return "Alto";
  if (u.includes("moderate")) return "Medio";
  return u || null;
};
const wxChips = s => {
  const c = [];
  if (s.air_temp != null)   c.push(["🌡️","Aria", s.air_temp.toFixed(1)+"°C"]);
  if (s.track_temp != null) c.push(["🛣️","Pista", s.track_temp.toFixed(1)+"°C"]);
  if (s.humidity != null)   c.push(["💧","Umidità", Math.round(s.humidity*100)+"%"]);
  if (s.wind_vel != null)   c.push(["💨","Vento", (s.wind_vel*3.6).toFixed(0)+" km/h "+compass(s.wind_dir)]);
  if (usageIt(s.track_usage)) c.push(["🏁","Gommatura", usageIt(s.track_usage)]);
  return c;
};
const wxInline = s => wxChips(s).map(([e,,v])=>`${e} ${v}`).join(" · ");

async function api(p, opts={}){
  const tok = await auth.currentUser.getIdToken();
  const r = await fetch(`/api/${p}`, {...opts, headers: {"Authorization": "Bearer "+tok, "Content-Type": "application/json", ...(opts.headers||{})}});
  if(!r.ok) throw new Error(r.status);
  return r.json();
}
const setCrumb = parts => {
  crumb.innerHTML = parts.map((p,i) =>
    (i?'<span class="sep">/</span>':'') +
    (p.href ? `<a href="${p.href}">${esc(p.txt)}</a>` : `<span class="cur">${esc(p.txt)}</span>`)
  ).join("");
};

/* ---------- Auth views ---------- */
function viewLogin(registering=false){
  setCrumb([]);
  uarea.innerHTML = "";
  app.innerHTML = `<div class="auth">
    <h2>${registering?"Crea account":"Accedi"}</h2>
    <label>Email</label><input id="em" type="email" autocomplete="email">
    <label>Password</label><input id="pw" type="password" autocomplete="${registering?"new-password":"current-password"}">
    <button class="btn" id="go">${registering?"Registrati":"Accedi"}</button>
    <button class="btn ghost" id="goo">Continua con Google</button>
    <div class="swap">${registering?"Hai già un account? <a id='sw'>Accedi</a>":"Non hai un account? <a id='sw'>Registrati</a>"}</div>
    <div class="aerr" id="aerr"></div>
  </div>`;
  const err = m => document.getElementById("aerr").textContent = m;
  document.getElementById("sw").onclick = () => viewLogin(!registering);
  document.getElementById("go").onclick = async () => {
    const em = document.getElementById("em").value, pw = document.getElementById("pw").value;
    try{
      if (registering) await auth.createUserWithEmailAndPassword(em, pw);
      else await auth.signInWithEmailAndPassword(em, pw);
    }catch(e){ err(itAuthErr(e)); }
  };
  document.getElementById("goo").onclick = async () => {
    try{ await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
    catch(e){ err(itAuthErr(e)); }
  };
}
const itAuthErr = e => ({
  "auth/invalid-email":"Email non valida.",
  "auth/user-not-found":"Nessun account con questa email.",
  "auth/wrong-password":"Password errata.",
  "auth/invalid-credential":"Email o password errate.",
  "auth/email-already-in-use":"Esiste già un account con questa email.",
  "auth/weak-password":"Password troppo corta (minimo 6 caratteri).",
}[e.code] || "Errore: " + (e.message||e.code||e));

function renderUserArea(u){
  uarea.innerHTML = `<span>${esc(u.email||"")}</span><a href="#/devices">Dispositivi</a><a id="lo">Esci</a>`;
  document.getElementById("lo").onclick = () => auth.signOut();
}

/* ---------- Device link ---------- */
async function viewLink(){
  const code = new URLSearchParams(location.search).get("code") || "";
  setCrumb([{txt:"Collega dispositivo"}]);
  app.innerHTML = `<div class="linkcard">
    <h2 class="vt">Collega questo <em>PC</em></h2>
    <p style="color:var(--dim);font-size:14px">Il programma sul tuo PC di gara chiede di essere collegato al tuo account. Codice:</p>
    <div class="code">${esc(code)}</div>
    <button class="btn" id="ok">Collega al mio account</button>
    <div class="aerr" id="aerr"></div>
  </div>`;
  document.getElementById("ok").onclick = async () => {
    try{
      await api("device/link", {method:"POST", body: JSON.stringify({code})});
      app.innerHTML = `<div class="linkcard"><h2 class="vt">Collegato ✓</h2>
        <p style="color:var(--dim)">Puoi chiudere questa pagina. Il programma sul PC continuerà da solo.</p>
        <button class="btn ghost" onclick="history.replaceState(null,'','/');route()">Vai al mio archivio</button></div>`;
    }catch(e){
      document.getElementById("aerr").textContent = e.message==="410" ? "Codice scaduto: riavvia il programma sul PC." : "Codice non valido o già usato.";
    }
  };
}

/* ---------- Devices ---------- */
async function viewDevices(){
  setCrumb([{txt:"Le mie auto",href:"#/"},{txt:"Dispositivi"}]);
  const devs = await api("devices");
  app.innerHTML = `<h2 class="vt">I miei <em>dispositivi</em></h2>` + (devs.length ?
    devs.map(d => `<div class="devrow">
      <span class="dname">🖥️ ${esc(d.name||"PC")}</span>
      <span class="dmeta">${d.last_seen?"visto "+fdate(d.last_seen):"mai connesso"}</span>
      <button onclick="unlink(${d.id})">Scollega</button></div>`).join("") :
    `<div class="empty">Nessun dispositivo collegato. Avvia il programma sul PC di gara per collegarne uno.</div>`);
  window.unlink = async id => { await api("devices/"+id, {method:"DELETE"}); viewDevices(); };
}

/* ---------- Archivio ---------- */
async function viewCars(){
  setCrumb([{txt:"Le mie auto"}]);
  const cars = await api("cars");
  app.innerHTML = `<h2 class="vt">Le mie <em>auto</em></h2>` + (cars.length ?
    cars.map(c => `<div class="row" onclick="location.hash='#/car/${c.id}'">
      <div class="name">${esc(c.name)}</div>
      <div class="meta">${c.sessions} session${c.sessions==1?"e":"i"}</div>
      <div class="arrow">›</div></div>`).join("") :
    `<div class="empty">Nessuna telemetria salvata.<br>Avvia il programma sul PC di gara ed entra in pista: le auto appariranno qui da sole.</div>`);
  cars.forEach(c => cache.carName[c.id] = c.name);
}

async function viewTracks(carId){
  const carName = cache.carName[carId] || (await api("cars")).find(c=>c.id==carId)?.name || "Auto";
  cache.carName[carId] = carName;
  setCrumb([{txt:"Le mie auto",href:"#/"},{txt:carName}]);
  const tracks = await api(`cars/${carId}/tracks`);
  app.innerHTML = `<h2 class="vt">${esc(carName)} — <em>piste</em></h2>` + (tracks.length ?
    tracks.map(t => `<div class="acc" id="acc${t.id}">
      <div class="row" onclick="toggleTrack(${carId},${t.id})">
        <div class="name">${esc(t.name)}</div>
        <div class="meta">${t.sessions} session${t.sessions==1?"e":"i"}</div>
        <div class="arrow">▾</div></div>
      <div class="sess" id="sess${t.id}"></div></div>`).join("") :
    `<div class="empty">Nessuna pista registrata con questa auto.</div>`);
}

async function toggleTrack(carId, trackId){
  const acc = document.getElementById("acc"+trackId);
  if (acc.classList.contains("open")) { acc.classList.remove("open"); return; }
  document.querySelectorAll(".acc.open").forEach(a=>a.classList.remove("open"));
  acc.classList.add("open");
  const box = document.getElementById("sess"+trackId);
  box.innerHTML = `<a>Caricamento…</a>`;
  const ss = await api(`cars/${carId}/tracks/${trackId}/sessions`);
  box.innerHTML = ss.map(s => `<a href="#/session/${s.id}">
    <span class="stype ${stype(s.session_type)==="Gara"?"race":""}">${stype(s.session_type)}</span>
    <span class="sdate">${fdate(s.started_at)}${wxInline(s)?`<span class="wxline">${wxInline(s)}</span>`:""}</span>
    <span class="smeta">${s.laps} giri${s.best?" · best "+fmt(s.best):""}</span></a>`).join("")
    || `<a>Nessuna sessione.</a>`;
}
window.toggleTrack = toggleTrack;

const labelize = k => k.replace(/([a-z0-9])([A-Z])/g, "$1 $2").replace(/^./, c => c.toUpperCase());

function renderLeaves(obj){
  let html = "", rows = "";
  for (const [k,v] of Object.entries(obj)){
    if (v && typeof v === "object"){
      if (rows) { html += `<div class="kvgrid">${rows}</div>`; rows = ""; }
      html += `<h5>${esc(labelize(k))}</h5>` + renderLeaves(v);
    } else {
      rows += `<div class="kv"><span>${esc(labelize(k))}</span><span>${esc(v)}</span></div>`;
    }
  }
  if (rows) html += `<div class="kvgrid">${rows}</div>`;
  return html;
}

function renderBlocks(section){
  const blocks = []; let general = "";
  for (const [k,v] of Object.entries(section)){
    if (v && typeof v === "object")
      blocks.push(`<div class="setblock"><h4>${esc(labelize(k))}</h4>${renderLeaves(v)}</div>`);
    else
      general += `<div class="kv"><span>${esc(labelize(k))}</span><span>${esc(v)}</span></div>`;
  }
  if (general) blocks.unshift(`<div class="setblock"><h4>Generale</h4><div class="kvgrid">${general}</div></div>`);
  return `<div class="blockgrid">${blocks.join("")}</div>`;
}

const SETUP_TAB_ORDER = ["TiresAero", "Chassis", "Dampers", "Systems"];
function orderSetupTabs(entries){
  return entries.slice().sort((a, b) => {
    const ia = SETUP_TAB_ORDER.indexOf(a[0]), ib = SETUP_TAB_ORDER.indexOf(b[0]);
    if (ia === -1 && ib === -1) return 0;          // sezioni non previste: restano nel loro ordine relativo
    if (ia === -1) return 1;                        // vanno in coda
    if (ib === -1) return -1;
    return ia - ib;
  });
}

function renderSetup(obj, stintId){
  if (!obj || !Object.keys(obj).length) return `<div class="kv"><span>Setup non disponibile</span><span></span></div>`;
  const tabs = orderSetupTabs(Object.entries(obj));
  const btns = tabs.map(([k],i) =>
    `<button class="tabbtn ${i===0?"active":""}" data-tab="t${i}" onclick="selectSetupTab(${stintId},'t${i}')">${esc(labelize(k))}</button>`).join("");
  const panes = tabs.map(([k,v],i) =>
    `<div class="tabpane ${i===0?"active":""}" data-tab="t${i}">${renderBlocks(v && typeof v==="object" ? v : {[k]:v})}</div>`).join("");
  return `<div class="setuptabs">
    <div class="tabsrow">
      <button class="tabarrow" onclick="scrollSetupTabs(${stintId},-1)">‹</button>
      <div class="tabstrip" id="tabstrip${stintId}">${btns}</div>
      <button class="tabarrow" onclick="scrollSetupTabs(${stintId},1)">›</button>
    </div>
    <div class="tabpanes" id="tabpanes${stintId}">${panes}</div>
  </div>`;
}
window.selectSetupTab = (stintId, tab) => {
  const strip = document.getElementById("tabstrip"+stintId), panes = document.getElementById("tabpanes"+stintId);
  strip.querySelectorAll(".tabbtn").forEach(b => b.classList.toggle("active", b.dataset.tab===tab));
  panes.querySelectorAll(".tabpane").forEach(p => p.classList.toggle("active", p.dataset.tab===tab));
  strip.querySelector(".tabbtn.active")?.scrollIntoView({behavior:"smooth", inline:"center", block:"nearest"});
};
window.scrollSetupTabs = (stintId, dir) => {
  const btns = [...document.getElementById("tabstrip"+stintId).querySelectorAll(".tabbtn")];
  const cur = btns.findIndex(b => b.classList.contains("active"));
  const next = Math.min(Math.max(cur+dir, 0), btns.length-1);
  selectSetupTab(stintId, btns[next].dataset.tab);
};

async function viewLaps(sessionId){
  const openSetups = new Set();
  let lastHtml = null;
  const load = async (isPoll=false) => {
    const d = await api(`sessions/${sessionId}/laps`);
    const s = d.session, stints = d.stints;
    const all = stints.flatMap(st=>st.laps);
    const best = all.length ? Math.min(...all.map(l=>l.time_s)) : null;
    const wxTd = v => `<td class="wxcol">${v==null?"–":v}</td>`;
    const html = `
      <h2 class="vt">${stype(s.session_type)} — <em>tempi</em></h2>
      <div class="board">
        <div class="lbl">Giro migliore</div>
        <div class="big">${best?fmt(best):"--:--.---"}</div>
        <div class="ctx">${esc(s.car)} · ${esc(s.track)} · ${fdate(s.started_at)}</div>
      </div>
      ${wxChips(s).length ? `<div class="wx">` + wxChips(s).map(([e,l,v]) =>
        `<div class="chip"><span class="ico">${e}</span><span class="cl">${l}</span><span class="cv">${v}</span></div>`).join("") + `</div>` : ""}` +
      (stints.length ? stints.map((st,i) => {
        const stBest = Math.min(...st.laps.map(l=>l.time_s));
        return `<section class="stint">
        <div class="sthead" onclick="toggleSetup(${st.id})">
          <span class="stnum">Stint ${i+1}</span>
          <span class="stname">🔧 ${esc(st.setup_name || "Setup sconosciuto")}</span>
          <span class="stmeta">${st.laps.length} giri · best ${fmt(stBest)}</span>
          <span class="arrow">${openSetups.has(st.id)?"▾":"▸"}</span>
        </div>
        <div class="setupbox ${openSetups.has(st.id)?"open":""}" id="setup${st.id}">${renderSetup(st.setup, st.id)}</div>
        <table><thead><tr><th>Giro</th><th>Tempo</th><th>🌡️</th><th>🛣️</th><th>💧</th><th>💨</th></tr></thead><tbody>` +
        st.laps.map(l=>`<tr class="${l.time_s===best?"best":""}"><td>${l.lap}</td><td>${fmt(l.time_s)}</td>` +
          wxTd(l.air_temp!=null?l.air_temp.toFixed(1)+"°":null) +
          wxTd(l.track_temp!=null?l.track_temp.toFixed(1)+"°":null) +
          wxTd(l.humidity!=null?Math.round(l.humidity*100)+"%":null) +
          wxTd(l.wind_vel!=null?(l.wind_vel*3.6).toFixed(0)+" "+compass(l.wind_dir):null) +
        `</tr>`).join("") + `</tbody></table></section>`;
      }).join("") :
      `<div class="empty">Ancora nessun giro completato in questa sessione.</div>`);
    // Durante gli aggiornamenti automatici, ridisegna solo se qualcosa è davvero cambiato:
    // evita il "lampeggio" di ridisegnare la stessa identica pagina ogni 5 secondi.
    if (isPoll && html === lastHtml) return;
    lastHtml = html;
    setCrumb([{txt:"Le mie auto",href:"#/"},{txt:s.car},{txt:s.track},{txt:stype(s.session_type)}]);
    app.innerHTML = html;
    window.toggleSetup = id => {
      openSetups.has(id) ? openSetups.delete(id) : openSetups.add(id);
      document.getElementById("setup"+id)?.classList.toggle("open");
    };
  };
  await load(false);
  pollTimer = setInterval(() => load(true).catch(()=>{}), 5000);
}

/* ---------- Router ---------- */
async function route(){
  clearInterval(pollTimer);
  const u = auth.currentUser;
  if (!u) { viewLogin(); return; }
  renderUserArea(u);
  try{
    if (location.pathname === "/link") { await viewLink(); return; }
    const h = location.hash.replace(/^#\/?/,"");
    let m;
    if (h === "devices") await viewDevices();
    else if ((m = h.match(/^car\/(\d+)/))) await viewTracks(+m[1]);
    else if ((m = h.match(/^session\/(\d+)/))) await viewLaps(+m[1]);
    else await viewCars();
  }catch(e){
    app.innerHTML = `<div class="err">Errore di caricamento (${esc(e.message)}). Riprova tra qualche secondo.</div>`;
  }
}
window.addEventListener("hashchange", route);
auth.onAuthStateChanged(() => route());
</script>
