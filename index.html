<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>iRacing Live Timing</title>
<link href="https://fonts.googleapis.com/css2?family=Chivo+Mono:wght@400;700&family=Archivo:wght@500;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0d10; --panel:#14181d; --line:#232a31;
  --ink:#e8edf2; --dim:#7d8a96;
  --go:#35d07f; --wait:#f2b63d; --off:#e2504c; --best:#b46cff;
}
*{box-sizing:border-box;margin:0}
body{background:var(--bg);color:var(--ink);font-family:'Archivo',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 16px}
header{width:100%;max-width:640px;display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
h1{font-size:15px;font-weight:800;letter-spacing:.14em;text-transform:uppercase}
h1 span{color:var(--dim)}
.pills{display:flex;gap:8px}
.pill{font-size:11px;font-weight:500;letter-spacing:.06em;padding:5px 10px;border:1px solid var(--line);border-radius:999px;color:var(--dim);display:flex;align-items:center;gap:6px}
.pill i{width:7px;height:7px;border-radius:50%;background:var(--off);display:inline-block}
.pill.on i{background:var(--go)}
.pill.wait i{background:var(--wait)}
.board{width:100%;max-width:640px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:26px 26px 20px;margin-bottom:14px}
.board .label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.board .time{font-family:'Chivo Mono',monospace;font-size:clamp(44px,10vw,72px);font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.board .sub{margin-top:10px;font-family:'Chivo Mono',monospace;font-size:13px;color:var(--dim)}
.board .sub b{color:var(--best);font-weight:700}
table{width:100%;max-width:640px;border-collapse:collapse;font-family:'Chivo Mono',monospace;font-size:14px}
th{font-family:'Archivo';font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);text-align:left;padding:8px 12px;border-bottom:1px solid var(--line)}
td{padding:9px 12px;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums}
td:last-child,th:last-child{text-align:right}
tr.best td{color:var(--best)}
tr.new td{animation:flash .8s ease-out}
@keyframes flash{from{background:#1f2730}to{background:transparent}}
.empty{max-width:640px;width:100%;text-align:center;color:var(--dim);font-size:13px;padding:34px 0;border:1px dashed var(--line);border-radius:14px}
@media (prefers-reduced-motion:reduce){tr.new td{animation:none}}
</style>
</head>
<body>
<header>
  <h1>iRacing <span>/ Live Timing</span></h1>
  <div class="pills">
    <div class="pill" id="pAgent"><i></i>Agente</div>
    <div class="pill" id="pIr"><i></i>iRacing</div>
  </div>
</header>

<div class="board">
  <div class="label">Ultimo giro</div>
  <div class="time" id="lastTime">--:--.---</div>
  <div class="sub">Giro <span id="lastLap">–</span> · Migliore <b id="bestTime">--:--.---</b></div>
</div>

<div class="empty" id="empty">In attesa dei primi giri. Avvia l'agente sul PC di gara: la sessione apparirà qui da sola.</div>

<table id="tbl" hidden>
  <thead><tr><th>Giro</th><th>Tempo</th></tr></thead>
  <tbody id="rows"></tbody>
</table>

<script>
const token = new URLSearchParams(location.search).get("token") || "";
const proto = location.protocol === "https:" ? "wss" : "ws";
const laps = [];
let best = Infinity;

const $ = id => document.getElementById(id);
const fmt = s => {
  const m = Math.floor(s/60), r = s - m*60;
  return `${m}:${r.toFixed(3).padStart(6,"0")}`;
};
const setPill = (el, state) => { el.className = "pill " + state; };

function render(){
  $("empty").hidden = laps.length > 0;
  $("tbl").hidden = laps.length === 0;
  best = Math.min(...laps.map(l => l.lastLapTime), Infinity);
  $("rows").innerHTML = laps.slice().reverse().map((l,i) =>
    `<tr class="${l.lastLapTime===best?'best':''} ${i===0?'new':''}"><td>${l.lap}</td><td>${fmt(l.lastLapTime)}</td></tr>`).join("");
  const last = laps[laps.length-1];
  $("lastTime").textContent = last ? fmt(last.lastLapTime) : "--:--.---";
  $("lastLap").textContent = last ? last.lap : "–";
  $("bestTime").textContent = isFinite(best) ? fmt(best) : "--:--.---";
}

function connect(){
  const ws = new WebSocket(`${proto}://${location.host}/ws/viewer?token=${encodeURIComponent(token)}`);
  ws.onmessage = e => {
    const m = JSON.parse(e.data);
    if(m.type === "init"){ laps.length = 0; laps.push(...m.laps); syncStatus(m.agentOnline, m.iracing); render(); }
    else if(m.type === "lap"){ laps.push(m); render(); }
    else if(m.type === "reset"){ laps.length = 0; render(); }
    else if(m.type === "agent"){ syncStatus(m.online, m.iracing); }
  };
  ws.onclose = () => { setPill($("pAgent"),""); setPill($("pIr"),""); setTimeout(connect, 2000); };
}
function syncStatus(agent, ir){
  setPill($("pAgent"), agent ? "on" : "");
  setPill($("pIr"), ir ? "on" : agent ? "wait" : "");
}
connect();
</script>
</body>
</html>
