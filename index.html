<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prima Nota</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --blu:#1f4e79;
  --blu-chiaro:#dce8f4;
  --blu-riga:#eef4fa;
  --bordo:#b8c9da;
  --testo:#22303c;
  --grigio:#f5f7f9;
  --verde:#1e7a3c;
  --rosso:#b0322d;
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);color:var(--testo);background:var(--grigio);min-height:100vh}
header{background:var(--blu);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
header h1{font-size:1.15rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
main{max-width:1500px;margin:0 auto;padding:20px 16px 60px}
button{font-family:var(--font);cursor:pointer;border:none;border-radius:4px;padding:9px 18px;font-size:.9rem;font-weight:600}
.btn-primario{background:#fff;color:var(--blu)}
.btn-primario:hover{background:var(--blu-chiaro)}
.btn-blu{background:var(--blu);color:#fff}
.btn-blu:hover{background:#173b5c}
.btn-secondario{background:#fff;color:var(--testo);border:1px solid var(--bordo)}
.btn-secondario:hover{background:var(--grigio)}
.btn-rosso{background:#fff;color:var(--rosso);border:1px solid var(--rosso)}
.btn-rosso:hover{background:#fbeeee}
button:focus-visible,input:focus-visible,a:focus-visible{outline:2px solid var(--blu);outline-offset:2px}
.caricamento{text-align:center;padding:60px 0;color:#6a7a89}
/* Schermata 1 */
.intest-lista{display:grid;grid-template-columns:1fr repeat(3,minmax(90px,130px));gap:8px;padding:10px 14px;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#5a6b7a}
.riga-giorno{display:grid;grid-template-columns:1fr repeat(3,minmax(90px,130px));gap:8px;align-items:center;width:100%;text-align:left;background:#fff;border:1px solid var(--bordo);border-radius:6px;padding:14px;margin-bottom:8px;font-size:.95rem}
.riga-giorno:hover{background:var(--blu-riga);border-color:var(--blu)}
.riga-giorno .data-g{font-weight:600;color:var(--blu);text-align:left}
.riga-giorno span{text-align:right;font-variant-numeric:tabular-nums}
.saldo-pos{color:var(--verde);font-weight:700}
.saldo-neg{color:var(--rosso);font-weight:700}
.fila-lista{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.fila-lista .riga-giorno{flex:1;margin-bottom:0}
.btn-export-riga{flex:0 0 auto;background:#fff;border:1px solid var(--bordo);color:var(--blu);padding:10px 12px;font-size:.85rem}
.btn-export-riga:hover{background:var(--blu-chiaro)}
.testata-btns{display:flex;gap:8px}
.vuoto{background:#fff;border:1px dashed var(--bordo);border-radius:6px;padding:48px 20px;text-align:center;color:#6a7a89}
/* Schermata 2 */
.barra-dett{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.barra-dett .spinta{margin-left:auto;display:flex;gap:8px}
.campo{display:flex;align-items:center;gap:6px;font-size:.9rem}
.campo label{font-weight:600;color:var(--blu)}
.campo input{padding:7px 9px;border:1px solid var(--bordo);border-radius:4px;font-family:var(--font);font-size:.9rem}
.campo input[type=number]{width:80px}
.tab-wrap{background:#fff;border:1px solid var(--bordo);border-radius:6px}
table{border-collapse:collapse;width:100%;table-layout:fixed;font-size:.8rem}
th,td{border:1px solid var(--bordo);padding:0;overflow:hidden}
th{background:var(--blu-chiaro);color:var(--blu);font-weight:700;padding:6px 3px;text-align:center;font-size:.68rem;text-transform:uppercase;letter-spacing:.02em}
th.gruppo{background:var(--blu);color:#fff}
tbody tr:nth-child(even){background:var(--blu-riga)}
tr.riporto td{background:#f3ecd9}
tr.riporto td:first-child{font-weight:600;padding:7px 5px}
tr.riporto input{width:100%;border:none;padding:7px 5px;font-family:var(--font);font-size:.8rem;background:transparent;text-align:right}
tfoot td{background:var(--blu-chiaro);font-weight:700;padding:7px 5px;text-align:right;font-variant-numeric:tabular-nums;color:var(--blu);font-size:.78rem}
tfoot td:first-child{text-align:left}
.col-op{width:20%}
.col-note{width:11%}
.col-num{width:8.5%}
.col-x{width:30px}
td.cella-x{text-align:center}
.btn-x{background:none;border:none;color:var(--rosso);font-size:1rem;padding:6px 8px;line-height:1}
.btn-x:hover{background:#fbeeee;border-radius:4px}
.sotto-tab{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
tbody tr[data-idx]{cursor:pointer}
tbody tr[data-idx]:hover{background:var(--blu-chiaro)}
td.cella-op-vista{padding:7px 6px;text-align:left;vertical-align:top}
.op-nome{display:block;font-weight:600}
.op-dett{display:block;font-size:.7rem;color:#5a6b7a;font-weight:400;margin-top:1px}
td.num{padding:7px 5px;text-align:right;font-variant-numeric:tabular-nums}
td.cella-note{padding:7px 5px;text-align:center;font-size:.72rem;color:#3a4a58}
.riga-vuota td{padding:16px;text-align:center;color:#6a7a89;font-style:italic}
/* Menu a tendina operazioni */
.campo-op{position:relative;margin-bottom:12px}
.tendina{position:absolute;top:100%;left:0;right:0;max-height:220px;overflow-y:auto;background:#fff;border:1px solid var(--bordo);border-radius:4px;box-shadow:0 4px 14px rgba(0,0,0,.18);z-index:60}
.tendina button{display:block;width:100%;text-align:left;background:none;border:none;border-radius:0;padding:8px 12px;font-size:.85rem;font-weight:400}
.tendina button:hover{background:var(--blu-riga)}
.tendina .voce-dett{color:#6a7a89;font-size:.75rem;display:block}
.tendina .voce-aggiungi{border-top:1px solid var(--bordo);color:var(--blu);font-weight:600}
.tendina .voce-def{color:#8a97a3;font-size:.68rem;display:block;text-transform:uppercase;letter-spacing:.02em;margin-top:1px}
.tendina .voce-nessuna{color:#6a7a89;cursor:default}
.tendina .voce-nessuna:hover{background:none}
/* Modali */
.sfondo-modale{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px}
.modale{background:#fff;border-radius:8px;padding:22px;width:100%;max-width:400px}
.modale-riga{max-width:460px;max-height:92vh;overflow-y:auto}
.modale h2{font-size:1rem;color:var(--blu);margin-bottom:14px}
.modale label{display:block;font-size:.82rem;font-weight:600;margin:12px 0 4px}
.modale label:first-of-type{margin-top:0}
.modale input{width:100%;padding:8px 10px;border:1px solid var(--bordo);border-radius:4px;font-family:var(--font);font-size:.9rem;margin-bottom:12px}
.modale .campo-op input{margin-bottom:0}
.modale .fila-btn{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.modale .err{color:var(--rosso);font-size:.8rem;min-height:1em;margin-top:4px}
.gruppo-chip{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.chip{background:#fff;border:1px solid var(--bordo);color:var(--testo);padding:8px 14px;border-radius:20px;font-size:.85rem;font-weight:600}
.chip:hover{background:var(--blu-riga)}
.chip.attivo{background:var(--blu);color:#fff;border-color:var(--blu)}
/* Autenticazione */
#schermata-auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box-auth{background:#fff;border:1px solid var(--bordo);border-radius:8px;padding:32px;width:100%;max-width:380px}
.box-auth h1{color:var(--blu);font-size:1.3rem;text-align:center;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.box-auth p.sottotitolo{text-align:center;color:#6a7a89;font-size:.85rem;margin-bottom:22px}
.box-auth label{display:block;font-size:.82rem;font-weight:600;margin:12px 0 4px;color:var(--testo)}
.box-auth label:first-of-type{margin-top:0}
.box-auth input{width:100%;padding:9px 10px;border:1px solid var(--bordo);border-radius:4px;font-family:var(--font);font-size:.9rem}
.box-auth .err{color:var(--rosso);font-size:.82rem;min-height:1.2em;margin-top:10px}
.box-auth .msg-ok{color:var(--verde);font-size:.82rem;min-height:1.2em;margin-top:10px}
.box-auth .btn-blu{width:100%;margin-top:16px;padding:11px;font-size:.95rem}
.btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;border:1px solid var(--bordo);color:var(--testo);padding:11px;font-size:.95rem;border-radius:4px}
.btn-google:hover{background:var(--grigio)}
.btn-google svg{width:18px;height:18px;flex:0 0 auto}
.divisore-auth{display:flex;align-items:center;gap:10px;margin:18px 0 6px;color:#8a97a3;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em}
.divisore-auth::before,.divisore-auth::after{content:'';flex:1;height:1px;background:var(--bordo)}
.box-auth .cambia-modo{text-align:center;margin-top:16px;font-size:.85rem}
.box-auth .cambia-modo a{color:var(--blu);cursor:pointer;text-decoration:underline}
.box-auth .link-secondario{display:block;text-align:center;margin-top:10px;font-size:.8rem;color:var(--blu);cursor:pointer;text-decoration:underline}
.nascosto{display:none !important}
.btn-uscita{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.5)}
.btn-uscita:hover{background:rgba(255,255,255,.15)}
@media(max-width:640px){
  .intest-lista{grid-template-columns:1fr repeat(3,minmax(70px,1fr));font-size:.65rem}
  .riga-giorno{grid-template-columns:1fr repeat(3,minmax(70px,1fr));font-size:.82rem;padding:12px 10px}
}
</style>
</head>
<body>
<div id="schermata-auth" class="nascosto">
  <div class="box-auth">
    <h1>Prima Nota</h1>
    <p class="sottotitolo" id="auth-sottotitolo">Accedi con la tua email</p>
    <button type="button" class="btn-google" id="btn-google">
      <svg viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Accedi con Google
    </button>
    <div class="divisore-auth">oppure</div>
    <form id="form-auth">
      <label for="auth-email">Email</label>
      <input type="email" id="auth-email" autocomplete="email" required>
      <label for="auth-pw">Password</label>
      <input type="password" id="auth-pw" autocomplete="current-password" required minlength="6">
      <div class="err" id="auth-err"></div>
      <div class="msg-ok" id="auth-ok"></div>
      <button type="submit" class="btn-blu" id="auth-submit">Accedi</button>
    </form>
    <div class="cambia-modo">
      <span id="auth-testo-cambio">Non hai un account?</span> <a id="auth-link-cambio">Registrati</a>
    </div>
    <a class="link-secondario" id="auth-link-reset">Password dimenticata?</a>
  </div>
</div>
<header id="header-app" class="nascosto">
  <h1 id="titolo">Prima Nota</h1>
  <div style="display:flex;align-items:center;gap:12px">
    <div id="azioni-testata"></div>
    <button class="btn-uscita" id="btn-esci">Esci</button>
  </div>
</header>
<main id="app" class="nascosto"><div class="caricamento">Caricamento dati…</div></main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, onAuthStateChanged, signInWithEmailAndPassword,
  createUserWithEmailAndPassword, signOut, sendPasswordResetEmail,
  GoogleAuthProvider, signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, doc, getDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDeDoXIFQ_jShlK8MYFjGRz0_AeUGPPpCI",
  authDomain: "l-acquolina.firebaseapp.com",
  projectId: "l-acquolina",
  storageBucket: "l-acquolina.firebasestorage.app",
  messagingSenderId: "30533264872",
  appId: "1:30533264872:web:cb5f542f6bb871b0b3305d",
  measurementId: "G-5S90H5VBP3"
};

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);

/* ---------- Schermata di autenticazione ---------- */
const schermataAuth = document.getElementById('schermata-auth');
const headerApp = document.getElementById('header-app');
const mainApp = document.getElementById('app');
const formAuth = document.getElementById('form-auth');
const campoEmail = document.getElementById('auth-email');
const campoPw = document.getElementById('auth-pw');
const authErr = document.getElementById('auth-err');
const authOk = document.getElementById('auth-ok');
const authSubmit = document.getElementById('auth-submit');
const authSottotitolo = document.getElementById('auth-sottotitolo');
const authTestoCambio = document.getElementById('auth-testo-cambio');
const authLinkCambio = document.getElementById('auth-link-cambio');
const authLinkReset = document.getElementById('auth-link-reset');
const btnEsci = document.getElementById('btn-esci');
const btnGoogle = document.getElementById('btn-google');

btnGoogle.onclick = async () => {
  authErr.textContent = ''; authOk.textContent = '';
  try{
    await signInWithPopup(auth, new GoogleAuthProvider());
  }catch(e){
    if(e.code!=='auth/popup-closed-by-user' && e.code!=='auth/cancelled-popup-request'){
      authErr.textContent = messaggioErrore(e.code);
    }
  }
};

let modo = 'login'; // 'login' oppure 'registrazione'
let appAvviata = false;

function messaggioErrore(codice){
  const mappa = {
    'auth/invalid-email': 'Indirizzo email non valido.',
    'auth/user-not-found': 'Non esiste un account con questa email.',
    'auth/wrong-password': 'Password errata.',
    'auth/invalid-credential': 'Email o password errati.',
    'auth/email-already-in-use': 'Esiste già un account con questa email. Prova ad accedere.',
    'auth/weak-password': 'La password deve avere almeno 6 caratteri.',
    'auth/too-many-requests': 'Troppi tentativi. Riprova tra qualche minuto.',
    'auth/network-request-failed': 'Problema di connessione. Controlla la rete.',
    'auth/operation-not-allowed': 'Questo metodo di accesso non è attivo su Firebase. Controlla le impostazioni di Authentication.',
    'auth/popup-blocked': 'Il browser ha bloccato la finestra di Google. Consenti i popup per questo sito e riprova.',
    'auth/unauthorized-domain': 'Questo indirizzo non è autorizzato su Firebase. Aggiungi il dominio in Authentication → Settings → Authorized domains.'
  };
  return mappa[codice] || 'Si è verificato un errore. Riprova.';
}

function aggiornaModoAuth(){
  authErr.textContent = ''; authOk.textContent = '';
  if(modo==='login'){
    authSottotitolo.textContent = 'Accedi con la tua email';
    authSubmit.textContent = 'Accedi';
    authTestoCambio.textContent = 'Non hai un account?';
    authLinkCambio.textContent = 'Registrati';
    authLinkReset.classList.remove('nascosto');
  } else {
    authSottotitolo.textContent = 'Crea un nuovo account';
    authSubmit.textContent = 'Registrati';
    authTestoCambio.textContent = 'Hai già un account?';
    authLinkCambio.textContent = 'Accedi';
    authLinkReset.classList.add('nascosto');
  }
}
authLinkCambio.onclick = () => { modo = modo==='login' ? 'registrazione' : 'login'; aggiornaModoAuth(); };
authLinkReset.onclick = async () => {
  const email = campoEmail.value.trim();
  if(!email){ authErr.textContent = 'Inserisci prima la tua email nel campo sopra.'; return; }
  try{
    await sendPasswordResetEmail(auth, email);
    authErr.textContent = '';
    authOk.textContent = 'Email di ripristino inviata. Controlla la posta.';
  }catch(e){ authOk.textContent=''; authErr.textContent = messaggioErrore(e.code); }
};

formAuth.addEventListener('submit', async (e) => {
  e.preventDefault();
  authErr.textContent = ''; authOk.textContent = '';
  const email = campoEmail.value.trim();
  const pw = campoPw.value;
  authSubmit.disabled = true;
  try{
    if(modo==='login'){
      await signInWithEmailAndPassword(auth, email, pw);
    } else {
      await createUserWithEmailAndPassword(auth, email, pw);
    }
  }catch(err){
    authErr.textContent = messaggioErrore(err.code);
  } finally {
    authSubmit.disabled = false;
  }
});

btnEsci.onclick = async () => {
  if(!confirm('Vuoi uscire dal tuo account?')) return;
  await signOut(auth);
  location.reload();
};

onAuthStateChanged(auth, (utente) => {
  if(utente){
    schermataAuth.classList.add('nascosto');
    headerApp.classList.remove('nascosto');
    mainApp.classList.remove('nascosto');
    if(!appAvviata){
      appAvviata = true;
      avviaApp(db, doc, getDoc, setDoc, utente.uid);
    }
  } else {
    headerApp.classList.add('nascosto');
    mainApp.classList.add('nascosto');
    schermataAuth.classList.remove('nascosto');
    campoEmail.value=''; campoPw.value='';
    modo='login'; aggiornaModoAuth();
  }
});

/* ---------- Applicazione Prima Nota (avviata dopo il login) ---------- */
function avviaApp(db, doc, getDoc, setDoc, uid){
const store = {
  async carica(){
    try{
      const rif = doc(db, 'users', uid);
      const istantanea = await getDoc(rif);
      if(istantanea.exists()){
        const d = istantanea.data();
        return d && d.datiApp ? JSON.parse(d.datiApp) : {days:{}, operazioni:[]};
      }
      return {days:{}, operazioni:[]};
    }catch(e){
      console.error('Caricamento da Firestore fallito:', e);
      alert('Impossibile caricare i dati. Controlla la connessione internet e ricarica la pagina.');
      return {days:{}, operazioni:[]};
    }
  },
  async salva(dati){
    try{
      const s = JSON.stringify(dati);
      const rif = doc(db, 'users', uid);
      await setDoc(rif, {datiApp: s, aggiornatoIl: new Date().toISOString()});
    }catch(e){
      console.error('Salvataggio su Firestore fallito:', e);
      alert('Impossibile salvare i dati. Controlla la connessione internet e riprova.');
    }
  }
};

let dati = {days:{}, operazioni:[]};
const app = document.getElementById('app');
const testata = document.getElementById('azioni-testata');
const CAMPI_NUM = ['entrate','uscite','versamenti','prelevamenti','fuoriCassa','addebitare','accreditare'];

const CATEGORIE = {
  cassa: {label:'Cassa', subs:[{v:'entrata',l:'Entrata'},{v:'uscita',l:'Uscita'}]},
  banca: {label:'Banca', subs:[{v:'versamento',l:'Versamento'},{v:'prelevamento',l:'Prelevamento'}]},
  conti: {label:'Conti', subs:[{v:'addebitare',l:'Da addebitare'},{v:'accreditare',l:'Da accreditare'}]}
};
const MAPPA_COLONNA = {
  'cassa|entrata':'entrate', 'cassa|uscita':'uscite',
  'banca|versamento':'versamenti', 'banca|prelevamento':'prelevamenti',
  'conti|addebitare':'addebitare', 'conti|accreditare':'accreditare'
};

const fmt = n => n.toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtData = iso => { const [a,m,g]=iso.split('-'); return `${g}/${m}/${a}`; };
const oggi = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };
const escHtml = s => (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function parseImporto(v){
  if(v===''||v==null) return 0;
  const s = String(v).trim().replace(/\./g,'').replace(',','.');
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}
const parseImportoSicuro = v => { const n = parseImporto(v); return n===null ? 0 : n; };

/* Converte una riga (nuovo formato o vecchio formato pre-popup) in uno schema comune */
function normalizzaRiga(r){
  if(r && r.cat){
    return {op:r.op||'', dett:r.dett||'', cat:r.cat, sub:r.sub||'', importo:r.importo??'', metodo:r.metodo||'', fuoriCassa:r.fuoriCassa||''};
  }
  const mappaLegacy = [['entrate','cassa','entrata'],['uscite','cassa','uscita'],['versamenti','banca','versamento'],['prelevamenti','banca','prelevamento'],['addebitare','conti','addebitare'],['accreditare','conti','accreditare']];
  if(r){
    for(const [campo,cat,sub] of mappaLegacy){
      if(r[campo]!==undefined && r[campo]!==''){
        return {op:r.op||'', dett:'', cat, sub, importo:r[campo], metodo:(r.note==='Contanti'||r.note==='Bancomat')?r.note:'', fuoriCassa:r.fuoriCassa||''};
      }
    }
  }
  return {op:(r&&r.op)||'', dett:'', cat:'', sub:'', importo:'', metodo:(r&&(r.note==='Contanti'||r.note==='Bancomat'))?r.note:'', fuoriCassa:(r&&r.fuoriCassa)||''};
}

function colsDiRiga(rNorm){
  const cols = {entrate:0,uscite:0,versamenti:0,prelevamenti:0,addebitare:0,accreditare:0};
  const chiave = MAPPA_COLONNA[rNorm.cat+'|'+rNorm.sub];
  if(chiave) cols[chiave] = parseImportoSicuro(rNorm.importo);
  cols.fuoriCassa = parseImportoSicuro(rNorm.fuoriCassa);
  return cols;
}

function totaliGiorno(g){
  const t = {entrate:0,uscite:0,versamenti:0,prelevamenti:0,fuoriCassa:0,addebitare:0,accreditare:0};
  for(const rGrezza of g.rows){
    const c = colsDiRiga(normalizzaRiga(rGrezza));
    for(const k of CAMPI_NUM) t[k]+=c[k];
  }
  return t;
}

function riportoAuto(iso){
  const prec = Object.keys(dati.days).filter(d=>d<iso).sort().pop();
  if(!prec) return 0;
  const g = dati.days[prec];
  const t = totaliGiorno(g);
  const rip = g.riporto!=null && g.riporto!=='' ? parseImporto(g.riporto)||0 : riportoAuto(prec);
  return rip + t.entrate - t.uscite;
}

/* ---------- Esportazione Excel ---------- */
const fmtDataFile = iso => { const [a,m,g]=iso.split('-'); return `${g}-${m}-${a}`; };

function foglioGiorno(iso){
  const g = dati.days[iso];
  const intest = ['Operazioni','Riporto €','Entrate','Uscite','Note','Versamenti','Prelevamenti','Partite fuori cassa','Da addebitare','Da accreditare'];
  const righe = [intest];
  const ripNum = g.riporto!=null && g.riporto!=='' ? (parseImporto(g.riporto)??0) : riportoAuto(iso);
  righe.push(['Riporto dal giorno precedente', ripNum, '', '', '', '', '', '', '', '']);
  const t = {entrate:0,uscite:0,versamenti:0,prelevamenti:0,fuoriCassa:0,addebitare:0,accreditare:0};
  for(const rGrezza of g.rows){
    const r = normalizzaRiga(rGrezza);
    const c = colsDiRiga(r);
    for(const k of CAMPI_NUM) t[k]+=c[k];
    const opTesto = r.dett ? `${r.op} - ${r.dett}` : r.op;
    const v = n => n ? n : '';
    righe.push([opTesto, '', v(c.entrate), v(c.uscite), r.metodo||'', v(c.versamenti), v(c.prelevamenti), v(c.fuoriCassa), v(c.addebitare), v(c.accreditare)]);
  }
  righe.push(['Totali', '', t.entrate, t.uscite, '', t.versamenti, t.prelevamenti, t.fuoriCassa, t.addebitare, t.accreditare]);
  const ws = XLSX.utils.aoa_to_sheet(righe);
  ws['!cols'] = [{wch:34},{wch:12},{wch:11},{wch:11},{wch:11},{wch:12},{wch:13},{wch:16},{wch:13},{wch:14}];
  return ws;
}

function esportaGiorni(listaIso, nomeFile){
  if(typeof XLSX === 'undefined'){
    alert('Libreria di esportazione non disponibile. Controlla la connessione a internet e ricarica la pagina.');
    return;
  }
  const wb = XLSX.utils.book_new();
  for(const iso of listaIso){
    XLSX.utils.book_append_sheet(wb, foglioGiorno(iso), fmtDataFile(iso));
  }
  XLSX.writeFile(wb, nomeFile);
}

const esportaSingolo = iso => esportaGiorni([iso], `prima-nota_${fmtDataFile(iso)}.xlsx`);

      else if(importoTxt==='' || importoNum===null || importoNum<0) errore = 'Inserisci un importo valido.';
      if(errore){ errBox.textContent = errore; return; }
      const fuoriTxt = inpFuoriCassa.value.trim();
      if(fuoriTxt!=='' && parseImporto(fuoriTxt)===null){ errBox.textContent = 'L\'importo delle partite fuori cassa non è valido.'; return; }
      const nuovaRigaDati = {
        op: opVal, dett: inpDett.value.trim(),
        cat: statoCat, sub: statoSub,
        importo: importoTxt, metodo: statoMetodo,
        fuoriCassa: fuoriTxt
      };
      if(editing) g.rows[idx] = nuovaRigaDati; else g.rows.push(nuovaRigaDati);
      const nomeNorm = opVal.trim().toLowerCase();
      let idxOp = -1;
      for(let i=0; i<dati.operazioni.length; i++){
        if(dati.operazioni[i].nome.trim().toLowerCase() === nomeNorm){
          idxOp = i;
          break;
        }
      }
      if(idxOp>=0){
        dati.operazioni[idxOp].cat = statoCat;
        dati.operazioni[idxOp].sub = statoSub;
        dati.operazioni[idxOp].metodo = statoMetodo;
      } else {
        dati.operazioni.push({nome:opVal.trim(), dettaglio:'', cat:statoCat, sub:statoSub, metodo:statoMetodo});
      }
      await store.salva(dati);
      chiudi();
      renderCorpo();
    };
  }

  renderCorpo();

  document.getElementById('in-riporto').addEventListener('input', ()=>{
    const inp = document.getElementById('in-riporto');
    inp.style.color = parseImporto(inp.value)!==null ? '' : 'var(--rosso)';
  });

  document.getElementById('btn-riga').onclick = () => apriModaleRiga(null);

  document.getElementById('btn-esporta-giorno').onclick = () => esportaSingolo(iso);

  document.getElementById('btn-indietro').onclick = async () => {
    const gg = dati.days[iso];
    if(gg && gg.rows.length===0 && (gg.n===''||gg.n==null)){
      delete dati.days[iso];
      await store.salva(dati);
    }
    mostraLista();
  };

  document.getElementById('btn-elimina').onclick = async () => {
    if(!confirm(`Eliminare il giorno ${fmtData(iso)}? L'operazione non è reversibile.`)) return;
    delete dati.days[iso];
    await store.salva(dati);
    mostraLista();
  };

  document.getElementById('btn-salva').onclick = async () => {
    const nuovaData = document.getElementById('in-data').value || iso;
    const ripInput = document.getElementById('in-riporto').value.trim();
    const ripManuale = parseImporto(ripInput);
    const nVal = document.getElementById('in-n').value;
    const riportoFinal = (ripManuale!==null && Math.abs(ripManuale - ripCalc) > 0.004) ? ripInput : null;
    if(nuovaData !== iso){
      if(dati.days[nuovaData] && !confirm(`Esiste già un giorno con data ${fmtData(nuovaData)}. Sovrascriverlo?`)) return;
      dati.days[nuovaData] = {...g, n:nVal, riporto:riportoFinal};
      delete dati.days[iso];
    } else {
      g.n = nVal;
      g.riporto = riportoFinal;
    }
    await store.salva(dati);
    mostraLista();
  };
}

(async () => {
  dati = await store.carica();
  if(!dati || typeof dati!=='object' || !dati.days) dati = {days:{}, operazioni:[]};
  if(!Array.isArray(dati.operazioni)) dati.operazioni = [];
  mostraLista();
})();
} // fine avviaApp
</script>
</body>
</html>
